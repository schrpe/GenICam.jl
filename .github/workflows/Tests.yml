name: Test

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

# Cancel previous in-progress runs of the same workflow on the same ref.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Julia ${{ matrix.julia-version }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        julia-version: ['1.12']
        julia-arch: [x64]
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest
    env:
      # Force two threads so streaming/event-pump background tasks get
      # to schedule concurrently with the test runner.
      JULIA_NUM_THREADS: '2'

    steps:
      - uses: actions/checkout@v4

      - uses: julia-actions/setup-julia@v2
        with:
          version: ${{ matrix.julia-version }}
          arch: ${{ matrix.julia-arch }}

      - uses: julia-actions/cache@v2

      - uses: julia-actions/julia-buildpkg@v1

      - uses: julia-actions/julia-runtest@v1

      # CI runners don't have any GenTL producer installed, so the
      # live-camera tests in `runtests.jl` self-skip via their
      # `isempty(list_producers())` guard. Pure unit tests
      # (formula/parser/codec/pixelformats/paths) always run.
